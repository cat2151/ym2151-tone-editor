# 用途: demo-library/index.html と wasm/pkg/ を GitHub Pages にデプロイする
name: Deploy demo-library to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'demo-library/**'
      - 'wasm/**'
      - '.github/workflows/deploy-demo-library.yml'
  workflow_dispatch: # 手動実行

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache wasm-pack binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-bin

      - name: Install wasm-pack
        run: command -v wasm-pack || cargo install wasm-pack --locked

      - name: Build WASM
        run: wasm-pack build --target web wasm

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site
          cp -r demo-library/. _site/
          cp -r wasm/pkg _site/pkg

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
