# 用途: GitHub Pages にデプロイする
# - プロジェクトルート: Jekyll が README.md から生成
# - demo-library/: WASM デモページ
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - '_config.yml'
      - 'demo-library/**'
      - 'wasm/src/**'
      - 'wasm/Cargo.toml'
      - 'core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/deploy-demo-library.yml'
  workflow_dispatch: # 手動実行

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache wasm-pack binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-0.14.0

      - name: Install wasm-pack
        run: command -v wasm-pack || cargo install wasm-pack --version 0.14.0 --locked

      - name: Build WASM
        run: wasm-pack build --target web wasm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Copy demo-library into Pages artifact
        run: |
          mkdir -p _site/demo-library
          cp -r demo-library/. _site/demo-library/
          cp -r wasm/pkg _site/demo-library/pkg

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report-failure:
    needs: [build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ github.sha }}';
            const shortSha = sha.substring(0, 7);
            const title = `Deploy to GitHub Pages failed (${shortSha})`;
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const ref = '${{ github.ref }}';
            const body = [
              'Deploy to GitHub Pages failed.',
              '',
              `Branch/Ref: ${ref}`,
              `Commit: ${sha}`,
              '',
              'Please investigate the failures and fix them.',
              '',
              `Workflow run: ${runUrl}`
            ].join('\n');

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['ci-failure']
            });

            const existingIssue = issues.data.find(issue =>
              issue.title.includes(shortSha)
            );

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['ci-failure', 'bug']
              });
            }
